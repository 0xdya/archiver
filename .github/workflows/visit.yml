name: visite archiver
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
permissions:
  contents: write
env:
  TARGET_BRANCH: main
  GIT_NAME: "0xdya"
  GIT_EMAIL: "0xdya@proton.me"
  FIREBASE_URL: "https://oxdyaa-default-rtdb.firebaseio.com/visits.json"
jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Process Visits
        run: |
          git config user.name "${{ env.GIT_NAME }}"
          git config user.email "${{ env.GIT_EMAIL }}"

          for i in 1 2 3; do
            VISITS=$(curl -s --max-time 15 "${{ env.FIREBASE_URL }}" | tr -d '"')
            [[ "$VISITS" =~ ^[0-9]+$ ]] && break
            echo "Attempt $i failed. Retrying in 10s..."
            sleep 10
          done

          if ! [[ "$VISITS" =~ ^[0-9]+$ ]]; then
            echo "::error::فشل جلب البيانات بعد 3 محاولات. القيمة: $VISITS"
            exit 1
          fi

          if [ -f archive.txt ]; then
            LAST_VISITS=$(grep -oE '[0-9,]+ زيارة' archive.txt | tail -n 1 | tr -d ',' | grep -oE '[0-9]+')
          else
            LAST_VISITS=0
          fi
          LAST_VISITS=${LAST_VISITS:-0}

          DIFF=$((VISITS - LAST_VISITS))

          if [ "$DIFF" -le 0 ]; then
            echo "لا توجد زيارات جديدة. تم تخطي الكوميت."
            exit 0
          fi

          MONTHS=("" "جانفي" "فيفري" "مارس" "أفريل" "ماي" "جوان" "جويلية" "أوت" "سبتمبر" "أكتوبر" "نوفمبر" "ديسمبر")
          MONTH_NUM=$(TZ=Africa/Algiers date +"%m" | sed 's/^0//')
          DAY=$(TZ=Africa/Algiers date +"%d")
          YEAR=$(TZ=Africa/Algiers date +"%Y")
          MONTH_AR="${MONTHS[$MONTH_NUM]}"
          TODAY="$MONTH_AR $DAY، $YEAR"

          FORMATTED_VISITS=$(printf "%'d" "$VISITS")
          FORMATTED_DIFF=$(printf "%'d" "$DIFF")

          [ ! -f archive.txt ] && touch archive.txt

          LAST_DATE=$(grep -E "^[أ-ي]+ [0-9]+، [0-9]{4}$" archive.txt | tail -n 1 || echo "")
          if [ "$TODAY" != "$LAST_DATE" ]; then
            echo -e "\n$TODAY" >> archive.txt
          fi

          echo "23:00 => $FORMATTED_VISITS زيارة (+$FORMATTED_DIFF)" >> archive.txt
          git add archive.txt
          git pull --rebase origin ${{ env.TARGET_BRANCH }} || true
          git commit -m "تحديث تلقائي - $TODAY (+$FORMATTED_DIFF زيارة) [skip ci] [vercel skip ci]"
          git push origin ${{ env.TARGET_BRANCH }}
