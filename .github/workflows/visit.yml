name: visite archiver
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
permissions:
  contents: write
env:
  TARGET_BRANCH: main
#  GIT_NAME: "0xdya"
#  GIT_EMAIL: "0xdya@proton.me"

  GIT_NAME: "github-actions[bot]"
  GIT_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"

  FIREBASE_URL: "https://oxdyaa-default-rtdb.firebaseio.com/visits.json"
jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Process Visits
        run: |
          git config user.name "${{ env.GIT_NAME }}"
          git config user.email "${{ env.GIT_EMAIL }}"

          for i in 1 2 3; do
            VISITS=$(curl -s --max-time 15 "${{ env.FIREBASE_URL }}" | tr -d '"')
            [[ "$VISITS" =~ ^[0-9]+$ ]] && break
            echo "Attempt $i failed. Retrying in 10s..."
            sleep 10
          done

          if ! [[ "$VISITS" =~ ^[0-9]+$ ]]; then
            echo "::error::فشل جلب البيانات بعد 3 محاولات. القيمة: $VISITS"
            exit 1
          fi

          if [ -f archive.txt ]; then
            LAST_VISITS=$(grep -oP '(?<==> )\d+' archive.txt | head -n 1)
            LAST_VISITS=${LAST_VISITS:-0}
          else
            LAST_VISITS=0
          fi

          DIFF=$((VISITS - LAST_VISITS))

          if [ "$DIFF" -le 0 ]; then
            echo "لا توجد زيارات جديدة. تم تخطي الكوميت."
            exit 0
          fi

          DATE=$(TZ=Africa/Algiers date +"%b %d, %Y")
          TIME=$(TZ=Africa/Algiers date +"%H:%M")

          TEMP_FILE=$(mktemp)
          
          echo "$DATE" > "$TEMP_FILE"
          echo "$TIME => $VISITS visits (+$DIFF)" >> "$TEMP_FILE"
          
          if [ -f archive.txt ]; then
            echo "" >> "$TEMP_FILE"
            cat archive.txt >> "$TEMP_FILE"
          fi
          
          mv "$TEMP_FILE" archive.txt

          git add archive.txt
          git pull --rebase origin ${{ env.TARGET_BRANCH }} || true
          git commit \
            --author="0xdya <0xdya@proton.me>" \
            -m "تحديث يوم - $DATE (+$DIFF زيارة) "
          git push origin ${{ env.TARGET_BRANCH }}
