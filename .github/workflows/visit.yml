name: visite archiver
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
permissions:
  contents: write
env:
  TARGET_BRANCH: main
  GIT_NAME: "0xdya"
  GIT_EMAIL: "0xdya@proton.me"
  FIREBASE_URL: "https://oxdyaa-default-rtdb.firebaseio.com/visits.json"
jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Process Visits
        run: |
          git config user.name "${{ env.GIT_NAME }}"
          git config user.email "${{ env.GIT_EMAIL }}"

          for i in 1 2 3; do
            VISITS=$(curl -s --max-time 15 "${{ env.FIREBASE_URL }}" | tr -d '"')
            [[ "$VISITS" =~ ^[0-9]+$ ]] && break
            echo "Attempt $i failed. Retrying in 10s..."
            sleep 10
          done

          if ! [[ "$VISITS" =~ ^[0-9]+$ ]]; then
            echo "::error::فشل جلب البيانات بعد 3 محاولات. القيمة: $VISITS"
            exit 1
          fi

          if [ -f archive.json ]; then
            LAST_VISITS=$(python3 -c "import json; data=json.load(open('archive.json')); print(data[-1]['visits'] if data else 0)")
          else
            LAST_VISITS=0
          fi
          LAST_VISITS=${LAST_VISITS:-0}

          DIFF=$((VISITS - LAST_VISITS))

          if [ "$DIFF" -le 0 ]; then
            echo "لا توجد زيارات جديدة. تم تخطي الكوميت."
            exit 0
          fi

          MONTHS=("" "جانفي" "فيفري" "مارس" "أفريل" "ماي" "جوان" "جويلية" "أوت" "سبتمبر" "أكتوبر" "نوفمبر" "ديسمبر")
          MONTH_NUM=$(TZ=Africa/Algiers date +"%m" | sed 's/^0//')
          DAY=$(TZ=Africa/Algiers date +"%d")
          YEAR=$(TZ=Africa/Algiers date +"%Y")
          MONTH_AR="${MONTHS[$MONTH_NUM]}"
          TODAY="$MONTH_AR $DAY، $YEAR"

          python3 -c "
          import json, os

          path = 'archive.json'
          data = []
          if os.path.exists(path):
              with open(path) as f:
                  data = json.load(f)

          data.append({
              'date': '$TODAY',
              'visits': $VISITS,
              'diff': $DIFF
          })

          with open(path, 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          "

          git add archive.json
          git pull --rebase origin ${{ env.TARGET_BRANCH }} || true
          git commit -m "تحديث تلقائي - $TODAY (+$DIFF زيارة) [skip ci] [vercel skip ci]"
          git push origin ${{ env.TARGET_BRANCH }}
