name: visite archiver
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
permissions:
  contents: write
env:
  TARGET_BRANCH: main
  GIT_NAME: "0xdya"
  GIT_EMAIL: "0xdya@proton.me"
  FIREBASE_URL: "https://oxdyaa-default-rtdb.firebaseio.com/visits.json"
jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Process Visits
        run: |
          git config user.name "${{ env.GIT_NAME }}"
          git config user.email "${{ env.GIT_EMAIL }}"

          for i in 1 2 3; do
            VISITS=$(curl -s --max-time 15 "${{ env.FIREBASE_URL }}" | tr -d '"')
            [[ "$VISITS" =~ ^[0-9]+$ ]] && break
            echo "Attempt $i failed. Retrying in 10s..."
            sleep 10
          done

          if ! [[ "$VISITS" =~ ^[0-9]+$ ]]; then
            echo "::error::فشل جلب البيانات بعد 3 محاولات. القيمة: $VISITS"
            exit 1
          fi

          if [ -f archive.txt ]; then
            LAST_LINE=$(tail -n 1 archive.txt)
            LAST_VISITS=$(echo "$LAST_LINE" | grep -oP '(?<==> )\d+' | head -1)
            LAST_VISITS=${LAST_VISITS:-0}
          else
            LAST_VISITS=0
          fi

          DIFF=$((VISITS - LAST_VISITS))

          if [ "$DIFF" -le 0 ]; then
            echo "لا توجد زيارات جديدة. تم تخطي الكوميت."
            exit 0
          fi

          DATE=$(TZ=Africa/Algiers date +"%b %d, %Y")
          TIME=$(TZ=Africa/Algiers date +"%H:%M")

          if [ -f archive.txt ]; then
            LAST_DATE=$(tail -n 2 archive.txt | head -n 1)
            if [[ "$LAST_DATE" == "$DATE" ]]; then
              sed -i '$d' archive.txt
              echo "$TIME => $VISITS visits (+$DIFF)" >> archive.txt
            else
              echo "" >> archive.txt
              echo "$DATE" >> archive.txt
              echo "$TIME => $VISITS visits (+$DIFF)" >> archive.txt
            fi
          else
            echo "$DATE" >> archive.txt
            echo "$TIME => $VISITS visits (+$DIFF)" >> archive.txt
          fi

          git add archive.txt
          git pull --rebase origin ${{ env.TARGET_BRANCH }} || true
          git commit -m "تحديث تلقائي - $DATE (+$DIFF زيارة) [skip ci] [vercel skip ci]"
          git push origin ${{ env.TARGET_BRANCH }}
